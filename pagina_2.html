    <script>
    const aud = document.getElementById("aud")
    const but = document.getElementById("but")

    async function retrieve_song(audio) {
        const response = await fetch("https://raw.githubusercontent.com/Mauro5049/saco/main/virginia.mp3");
        if (!response.ok) {
            throw new Error(`${response.status}`);
        }
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);

        aud.src = objectUrl;
        aud.load();
    }

    function play_pause() {
        if (aud.paused) {
            but.textContent = "pausar musica"
            aud.play()
        }
        else {
            but.textContent = "tocar musica"
            aud.pause()
        }
    }

    retrieve_song(aud)
    </script>
